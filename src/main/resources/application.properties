spring.application.name=polaris

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5434/polaris}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:${REDISHOST:localhost}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${REDISPORT:6379}}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME:${REDISUSER:}}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:${REDISPASSWORD:}}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s
spring.data.redis.lettuce.shutdown-timeout=100ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.cors.allowed-origins=${MANAGEMENT_ENDPOINTS_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:4173}
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
management.endpoints.web.cors.allowed-headers=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.status.http-mapping.down=200
management.endpoint.health.status.http-mapping.out-of-service=200
management.endpoint.health.status.http-mapping.unknown=200

rate.limiter.type=${RATE_LIMITER_TYPE:sliding}
server.address=0.0.0.0
server.port=${PORT:8080}

# Auth and CORS
polaris.cors.allowed-origins=${POLARIS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173,http://127.0.0.1:4173}
polaris.cors.allowed-origin-patterns=${POLARIS_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.up.railway.app}
polaris.auth.admin.username=${POLARIS_AUTH_ADMIN_USERNAME:admin}
polaris.auth.admin.password=${POLARIS_AUTH_ADMIN_PASSWORD:Admin@123}
polaris.auth.user.username=${POLARIS_AUTH_USER_USERNAME:user}
polaris.auth.user.password=${POLARIS_AUTH_USER_PASSWORD:User@123}
polaris.auth.token-ttl-seconds=${POLARIS_AUTH_TOKEN_TTL_SECONDS:43200}
